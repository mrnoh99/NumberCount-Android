<?xml version="1.0" encoding="UTF-8"?>
<!--
  숫자세기 (NumberCount) — App Icon Source
  Canvas : 1024 × 1024  (Play Store upload size)
  Safe zone for adaptive icon foreground: 264 … 760 (66 % of 108 dp → 496 px centred)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>

    <!-- ── Background gradient: warm sunrise orange ── -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#FFD580"/>
      <stop offset="55%"  stop-color="#FFA726"/>
      <stop offset="100%" stop-color="#D97700"/>
    </linearGradient>

    <!-- ── Card gradient: pure white → very light cream ── -->
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFF8EC"/>
    </linearGradient>

    <!-- ── Dot inner-highlight gradients (top-left gloss) ── -->
    <radialGradient id="dotRed"    cx="35%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#FF6B60"/>
      <stop offset="100%" stop-color="#D32F2F"/>
    </radialGradient>
    <radialGradient id="dotYellow" cx="35%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#FFE066"/>
      <stop offset="100%" stop-color="#F9A800"/>
    </radialGradient>
    <radialGradient id="dotPurple" cx="35%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#B39DDB"/>
      <stop offset="100%" stop-color="#512DA8"/>
    </radialGradient>
    <radialGradient id="dotOrange" cx="35%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#FFCC80"/>
      <stop offset="100%" stop-color="#E65100"/>
    </radialGradient>
    <radialGradient id="dotGreen"  cx="35%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#81C784"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </radialGradient>

    <!-- ── Drop shadow for the white card ── -->
    <filter id="cardShadow" x="-12%" y="-8%" width="124%" height="128%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="22" result="blur"/>
      <feOffset dx="0" dy="18" result="shifted"/>
      <feFlood flood-color="#7B3F00" flood-opacity="0.28" result="color"/>
      <feComposite in="color" in2="shifted" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- ── Glow behind the "5" ── -->
    <filter id="numGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- ════════════════════════════════════════════
       1. BACKGROUND  (full 1024 × 1024 squircle)
       ════════════════════════════════════════════ -->
  <rect width="1024" height="1024" rx="228" ry="228" fill="url(#bgGrad)"/>

  <!-- ── Decorative background sparkles (✦) ── -->
  <!-- top-left -->
  <path d="M 130 148 L 142 176 L 170 188 L 142 200 L 130 228 L 118 200 L 90 188 L 118 176 Z"
        fill="#FFF0B0" opacity="0.55"/>
  <!-- top-right -->
  <path d="M 856 104 L 865 126 L 887 135 L 865 144 L 856 166 L 847 144 L 825 135 L 847 126 Z"
        fill="#FFF0B0" opacity="0.50"/>
  <!-- bottom-right -->
  <path d="M 890 840 L 902 868 L 930 880 L 902 892 L 890 920 L 878 892 L 850 880 L 878 868 Z"
        fill="#FFF0B0" opacity="0.45"/>
  <!-- bottom-left -->
  <path d="M 148 856 L 157 878 L 179 887 L 157 896 L 148 918 L 139 896 L 117 887 L 139 878 Z"
        fill="#FFF0B0" opacity="0.40"/>
  <!-- centre-top small -->
  <path d="M 512 72 L 518 90 L 536 96 L 518 102 L 512 120 L 506 102 L 488 96 L 506 90 Z"
        fill="#FFF0B0" opacity="0.60"/>

  <!-- ════════════════════════════════════════════
       2. WHITE CARD
       Centred: x=140, y=150, w=744, h=720, r=96
       ════════════════════════════════════════════ -->
  <rect x="140" y="150" width="744" height="720"
        rx="96" ry="96"
        fill="url(#cardGrad)"
        filter="url(#cardShadow)"/>

  <!-- Card border — orange, 8 px -->
  <rect x="140" y="150" width="744" height="720"
        rx="96" ry="96"
        fill="none"
        stroke="#FFA726" stroke-width="10"/>

  <!-- ════════════════════════════════════════════
       3. TARGET NUMBER  "5"
       Centred at (512, 450)
       ════════════════════════════════════════════ -->
  <!-- Soft amber glow behind number -->
  <text x="512" y="468"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900" font-size="400"
        fill="#FFD080" opacity="0.45"
        text-anchor="middle" dominant-baseline="middle"
        filter="url(#numGlow)">5</text>

  <!-- Main number -->
  <text x="512" y="468"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900" font-size="400"
        fill="#E08600"
        text-anchor="middle" dominant-baseline="middle">5</text>

  <!-- ════════════════════════════════════════════
       4. FIVE COUNTING DOTS
       Row centred at y = 738, radius = 52
       Spacing: 148 px  → x = 220, 368, 516, 664, 812
       All within card right edge 884
       ════════════════════════════════════════════ -->

  <!-- Dot 1 — Red (apple 🍎) -->
  <circle cx="220" cy="738" r="52" fill="url(#dotRed)"/>
  <circle cx="206" cy="724" r="14" fill="white" opacity="0.35"/>

  <!-- Dot 2 — Yellow (banana 🍌) -->
  <circle cx="368" cy="738" r="52" fill="url(#dotYellow)"/>
  <circle cx="354" cy="724" r="14" fill="white" opacity="0.35"/>

  <!-- Dot 3 — Purple (grape 🍇) -->
  <circle cx="516" cy="738" r="52" fill="url(#dotPurple)"/>
  <circle cx="502" cy="724" r="14" fill="white" opacity="0.35"/>

  <!-- Dot 4 — Orange (carrot 🥕) -->
  <circle cx="664" cy="738" r="52" fill="url(#dotOrange)"/>
  <circle cx="650" cy="724" r="14" fill="white" opacity="0.35"/>

  <!-- Dot 5 — Green (broccoli 🥦) -->
  <circle cx="812" cy="738" r="52" fill="url(#dotGreen)"/>
  <circle cx="798" cy="724" r="14" fill="white" opacity="0.35"/>

  <!-- ════════════════════════════════════════════
       5. STAR BADGE  (top-right corner of card)
       ════════════════════════════════════════════ -->
  <!-- Star shape — 5 points, centred at (826, 224) -->
  <path d="M 826 178
           L 839 213 L 876 213
           L 848 235 L 858 271
           L 826 250 L 794 271
           L 804 235 L 776 213
           L 813 213 Z"
        fill="#FFCC00"
        stroke="#E08600" stroke-width="4"/>

</svg>
